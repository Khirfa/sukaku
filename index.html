<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUKAKU - Kasir</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="logo-container">
            <div class="logo-oval">
                <span class="brand-name">SUKAKU</span>
                <span class="brand-sub">FRIED CHICKEN</span>
            </div>
        </div>
    </header>

    <main class="pos-container">
        <section class="menu-section">
            <h2 class="section-title">Menu Utama</h2>
            <div id="menu-items" class="menu-grid"></div>
        </section>

        <section class="cart-section">
            <h2 class="section-title">Detail Pesanan</h2>
            <div class="cart-card">
                <div id="cart-list" class="cart-list">
                    <p class="empty-cart-msg">Keranjang masih kosong.</p>
                </div>
                
                <div class="summary-area">
                    <div class="total-row">
                        <span>Total Akhir</span>
                        <span id="total-price" class="total-amount">Rp 0</span>
                    </div>
                    
					<div class="payment-input-area">
					<label>Metode Pembayaran</label>
						<div class="method-options">
							<label class="method-item">
								<input type="radio" name="pay-method" value="Tunai" checked onclick="togglePaymentMethod('Tunai')"> 
								<span><i class="fas fa-money-bill-wave"></i> Tunai</span>
							</label>
							<label class="method-item">
								<input type="radio" name="pay-method" value="QRIS" onclick="togglePaymentMethod('QRIS')"> 
								<span><i class="fas fa-qrcode"></i> QRIS</span>
							</label>
						</div>
						<div id="cash-input-group">
							<label for="cash-amount">Uang Tunai (Bayar)</label>
							<input type="text" id="cash-amount" inputmode="numeric" placeholder="0" oninput="formatRibuan(this)">
						</div>
					</div>
                    
                    <div class="change-row">
                        <span>Kembalian</span>
                        <span id="change-amount" class="change-amount">Rp 0</span>
                    </div>
                </div>
            </div>

            <div class="action-buttons">
                <button onclick="simpanKeLokal()" class="btn-simpan">
                    <i class="fas fa-save"></i> SIMPAN TRANSAKSI
                </button>
                <div class="secondary-btns">
                    <button onclick="exportKeSheets()" class="btn-export" disabled>
                        <i class="fas fa-file-export"></i> Export
                    </button>
                    <button onclick="resetCart()" class="btn-reset">
                        <i class="fas fa-undo"></i> Reset
                    </button>
                </div>
            </div>
        </section>

        <section class="history-section">
            <h2 class="section-title">Riwayat Penjualan</h2>
            <div class="history-card">
                <table id="history-table">
                    <thead>
                        <tr>
                            <th>Waktu</th>
                            <th>Pesanan</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="history-body"></tbody>
                    <tfoot id="history-footer">
                        <tr class="income-row">
                            <td colspan="2">TOTAL PENDAPATAN</td>
                            <td id="grand-total-income">Rp 0</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
